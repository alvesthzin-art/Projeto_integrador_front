<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="filtro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>Filtragem</title>
</head>
<body>

    <header class="topo">
        <a href="#" class="catalogo">
            <i class="fa-solid fa-book-open"></i>
            <span>Catálogo</span>
        </a>

        <div class="logo">
            <a href="#">
                <img src="/img/ChatGPT Image 12 de jun. de 2026, 08_35_04.png" alt="HoneyDukes">
            </a>
        </div>

        <div class="menuDireita">
            <form class="barraPesquisa">
                <input type="text" value="chocolate" aria-label="Pesquisar produto">
                <button type="submit" aria-label="Pesquisar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button type="button" aria-label="Limpar pesquisa">
                    <i class="fa-regular fa-circle-xmark"></i>
                </button>
            </form>

            <a href="#" class="administrador">
                <i class="fa-regular fa-user"></i>
                <span>Área do Administrador</span>
            </a>
        </div>
    </header>

    <main>
        <div class="respostaFiltro">
            <div class="tituloGrande">
                <span class="ornamento">{</span>
                <h1>Resultados para “chocolate”</h1>
                <span class="ornamento">}</span>
            </div>
            <div class="tituloPequeno">
                <h5>6 produtos encontrados</h5>
            </div>
        </div>

        <section class="vitrine"></section>

        <div class="paginacao">
            <button class="btn-pag"><i class="fa-solid fa-chevron-left"></i></button>
            <span class="num-pag ativa">1</span>
            <button class="btn-pag"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <footer>
        <div class="produtos">
            <div class="logoRodape">
                <a href="#">
                    <img src="/img/ChatGPT Image 12 de jun. de 2026, 08_35_04.png" alt="HoneyDukes">
                </a>
            </div>

            <div class="centroBaixo">
                <p>&copy; 2024 HoneyDukes - todos os direitos reservados.</p>
            </div>

            <div class="abelha">
                <p>Feito com mel e magia</p>
                <img src="/img/bee.png" alt="Abelha">
            </div>
        </div>
    </footer>

    <script src="filtro.js"></script>
</body>
</html>
