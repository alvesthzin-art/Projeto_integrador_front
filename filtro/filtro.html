<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="filtro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>Filtragem</title>
</head>
<body>
    <div class="imagemFundo">
        <img src="/img/Imagem de fundo - HoneyDukes.png" alt="Imagem de fundo">
    </div>

    <header class="topo">
        <a href="#" class="catalogo">
            <i class="fa-solid fa-book-open"></i>
            <span>Cat&aacute;logo</span>
        </a>

        <div class="logo">
            <img src="/img/ChatGPT Image 12 de jun. de 2026, 08_35_04.png" alt="HoneyDukes">
        </div>

        <div class="menuDireita">
            <form class="barraPesquisa">
                <input type="text" value="chocolate" aria-label="Pesquisar produto">
                <button type="submit" aria-label="Pesquisar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button type="button" aria-label="Limpar pesquisa">
                    <i class="fa-regular fa-circle-xmark"></i>
                </button>
            </form>

            <a href="#" class="administrador">
                <i class="fa-regular fa-user"></i>
                <span>&Aacute;rea do Administrador</span>
            </a>
        </div>
    </header>

    <main>
        <div class="respostaFiltro">
            <div class="tituloGrande">
                <h1>Resultados para &ldquo;chocolate&rdquo;</h1>
            </div>
            <div class="tituloPequeno">
                <h5>6 produtos encontrados</h5>
            </div>
        </div>
    </main>

    <footer>
        <div class="produtos">
            <div class="logoRodape">
                <img src="/img/ChatGPT Image 12 de jun. de 2026, 08_35_04.png" alt="HoneyDukes">
            </div>

            <div class="abelha">
                <img src="/img/bee.png" alt="">
                <p>Feito com mel e magia</p>
            </div>

            <div class="centroBaixo">
                <p>&copy; 2024 HoneyDukes - todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="filtro.js"></script>
</body>
</html>
