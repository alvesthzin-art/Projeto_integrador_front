
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./main.css" />
  <script type="module" src="./main.js" defer></script>
  <link rel="icon" href="https://res.cloudinary.com/dps7dz75i/image/upload/v1781702906/ChatGPT_Image_17_de_jun._de_2026_10_27_21_jkxhcg.png" type="image/x-icon" />
  <title>HoneyDukes</title>
</head>
<body>
  <header>
    <a href="#" class="header-esquerda">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
      </svg>
      Catálogo
    </a>
    <div class="box-logo">
      <img class="logo" src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="Logo HoneyDukes" />
    </div>
    <div class="header-direita">
      <div class="barra-pesquisa">
        <input type="text" placeholder="Buscar produtos..." />
        <button aria-label="Buscar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
      </div>
      <a href="#" class="admin-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Área do Administrador
      </a>
    </div>
  </header>

  <main>
    <div class="container" id="container">
      <div class="banner-container">
        <div class="banner-conteudo">
          <img src="../img/Banner - tela inicial.png" alt="imagem do banner" />
        </div>
      </div>
    </div>
  </main>

  <footer>
    <img class="logo-footer" src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="Logo HoneyDukes" />
    <span>© 2024 HoneyDukes – Todos os direitos reservados.</span>
    <span class="footer-tagline">
      Feito com mel e magia
      <img class="bee" src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273869/bee_jbhwp5.png" alt="" />
    </span>
  </footer>
</body>
</html>
