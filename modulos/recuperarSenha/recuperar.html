<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>HoneyDukes - Recuperar Senha</title>
    <link rel="stylesheet" href="recuperar.css">
</head>
<body>

    <!-- Logo Superior -->
    <div class="logo">
        <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="HoneyDukes">
    </div>

    <!-- Card de Recuperação -->
    <div class="recuperar-card">
        <h1>Digite seu email para enviarmos sua nova senha.</h1>

        <div class="campos">
            <!-- Campo de E-mail -->
            <div class="campo-input">
                <i class="far fa-envelope"></i>
                <input type="email" id="email-recuperar" placeholder="Digite seu e-mail" autocomplete="email">
            </div>
        </div>

        <!-- Botão Enviar -->
        <div class="btn-enviar-wrap">
            <button class="btn-enviar" onclick="enviarLink()">Enviar link de recuperação</button>
        </div>

        <!-- Link Voltar -->
        <div class="link-voltar">
            <a href="../admin.html"><i class="fas fa-angle-left"></i> Voltar para o login</a>
        </div>
    </div>

    <script src="recuperar.js"></script>
</body>
</html>
