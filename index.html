<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>HoneyDukes - Doces Mágicos</title>
</head>
<body>

    <header class="header">
        <div class="nav-left">
            <i class="fas fa-book-open"></i>
            <span>Catálogo</span>
        </div>
        
        <div class="logo">
            <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="HoneyDukes">
        </div>

        <div class="nav-right">
            <form action="/buscar" method="GET" class="pesquisa-form">
                <input type="text" placeholder="Buscar produtos..." name="pesquisa">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
            <div class="admin-area">
                <i class="fas fa-user-circle"></i>
                <span>Área do Administrador</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        
        <section class="hero-banner">
            <div class="banner-moldura">
                <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781449410/Banner_kvzosa.png" alt="Banner HoneyDukes" class="banner-img">
            </div>
        </section>

        <section class="destaques">
            <h2><span class="ornamento">❧</span> Destaques <span class="ornamento">❧</span></h2>
            
            <div class="produtos-grid">
                <div class="product-card">
                    <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781448143/Fudge_chocolate_hqujpk.png" alt="Fudge de Chocolate">
                    <div class="card-info">
                        <h3>Fudge de Chocolate</h3>
                        <p>Tradicional</p>
                    </div>
                </div>

                <div class="product-card">
                    <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781448364/Toffee_caramelo_azt7zv.png" alt="Toffee de Caramelo">
                    <div class="card-info">
                        <h3>Toffee de Caramelo</h3>
                        <p>Tradicional</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <a href="#" class="footer-link">
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-logo-box">
                    <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="HoneyDukes Logo">
                </div>
                <div class="footer-text">
                    <p>© 2024 HoneyDukes - Todos os direitos reservados. <span class="tagline">Feito com mel e magia 🐝</span></p>
                </div>
            </div>
        </footer>
    </a>

</body>
</html>
