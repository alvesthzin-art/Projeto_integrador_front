<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>HoneyDukes - Doces Mágicos</title>
</head>
<body>

    <header class="header">
        <div class="nav-left">
            <i class="fas fa-book-open"></i>
            <span>Catálogo</span>
        </div>
        
        <div class="logo">
            <img src="https://res.cloudinary.com/dps7dz75i/image/upload/v1781273395/ChatGPT_Image_12_de_jun._de_2026_08_35_04_cl5vwt.png" alt="HoneyDukes">
        </div>

        <div class="nav-right">
            <form action="/buscar" method="GET" class="pesquisa-form">
                <input type="text" placeholder="Buscar produtos..." name="pesquisa">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
            <div class="admin-area">
                <i class="fas fa-user-circle"></i>
                <span>Área do Administrador</span>
            </div>
        </div>
    </header>

</body>
</html>
